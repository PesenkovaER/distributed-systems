syntax = "proto3";

package survey;

service SurveyService {
  rpc SubmitAnswers(AnswerList) returns (SurveyResult);  
}

message Answer {
  string question = 1;
  string answer = 2;
}

message AnswerList {          
  repeated Answer answers = 1;  
}

message SurveyResult {
  int32 total_answers = 1;
  string message = 2;
}
